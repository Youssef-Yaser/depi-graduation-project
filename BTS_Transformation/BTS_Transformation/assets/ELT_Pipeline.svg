<svg viewBox="0 0 900 440" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4a5568"/>
    </marker>
  </defs>

  <rect width="900" height="440" fill="#ffffff"/>

  <!-- Raw Data -->
  <rect x="370" y="15" width="160" height="50" rx="8" fill="#1a535c"/>
  <text x="450" y="45" text-anchor="middle" fill="white" font-size="15" font-weight="600">Raw Data</text>

  <!-- Source Models -->
  <rect x="370" y="100" width="160" height="50" rx="8" fill="#0f7173"/>
  <text x="450" y="130" text-anchor="middle" fill="white" font-size="15" font-weight="600">Source Models</text>

  <!-- Staging Models -->
  <rect x="370" y="185" width="160" height="50" rx="8" fill="#0f7173"/>
  <text x="450" y="215" text-anchor="middle" fill="white" font-size="15" font-weight="600">Staging Models</text>

  <!-- Dimension Models -->
  <rect x="150" y="280" width="180" height="50" rx="8" fill="#1a8fe3"/>
  <text x="240" y="310" text-anchor="middle" fill="white" font-size="15" font-weight="600">Dimension Models</text>

  <!-- Fact Models -->
  <rect x="570" y="280" width="180" height="50" rx="8" fill="#1a8fe3"/>
  <text x="660" y="310" text-anchor="middle" fill="white" font-size="15" font-weight="600">Fact Models</text>

  <!-- Analytics Layer -->
  <rect x="370" y="365" width="160" height="50" rx="8" fill="#e8622c"/>
  <text x="450" y="395" text-anchor="middle" fill="white" font-size="15" font-weight="600">Analytics Layer</text>

  <!-- Arrows -->
  <line x1="450" y1="65" x2="450" y2="98" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="150" x2="450" y2="183" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="400" y1="235" x2="260" y2="278" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="500" y1="235" x2="640" y2="278" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="260" y1="330" x2="410" y2="363" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="640" y1="330" x2="490" y2="363" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>
</svg>

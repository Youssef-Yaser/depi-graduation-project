<svg width="1760" height="690" viewBox="0 0 1760 690" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
<title>BTS Airflow orchestration workflow</title>
<desc>Horizontal flow: BTS TranStats feeds the ingestion DAG, OurAirports/Skytrax seed data feeds the dbt build DAG, both running inside Docker Compose, refreshing FLIGHT_CORE for Power BI, on an Airflow monthly schedule.</desc>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>

  <symbol id="i-airflow" viewBox="0 0 24 24">
    <path d="M12 12C8 8 4 8 3 4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M12 12C16 8 16 4 20 3" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M12 12C10 16 6 19 3 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="12" cy="12" r="1.6" fill="currentColor"/>
  </symbol>

  <symbol id="i-container" viewBox="0 0 24 24">
    <path d="M12 3l8 4.5v9L12 21l-8-4.5v-9L12 3z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
    <path d="M12 3v9M4 7.5l8 4.5 8-4.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
  </symbol>

  <symbol id="i-cloud-down" viewBox="0 0 24 24">
    <path d="M7 18a4 4 0 010-8 5.5 5.5 0 0110.5-2 4 4 0 01-.5 7.9" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M12 10v7M9 14l3 3 3-3" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <symbol id="i-cloud-up" viewBox="0 0 24 24">
    <path d="M7 18a4 4 0 010-8 5.5 5.5 0 0110.5-2 4 4 0 01-.5 7.9" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M12 17v-7M9 13l3-3 3 3" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <symbol id="i-search" viewBox="0 0 24 24">
    <circle cx="10" cy="10" r="6" fill="none" stroke="currentColor" stroke-width="1.8"/>
    <path d="M14.5 14.5L20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
  </symbol>

  <symbol id="i-database" viewBox="0 0 24 24">
    <ellipse cx="12" cy="6" rx="8" ry="3" fill="none" stroke="currentColor" stroke-width="1.8"/>
    <path d="M4 6v6c0 1.7 3.6 3 8 3s8-1.3 8-3V6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M4 12v6c0 1.7 3.6 3 8 3s8-1.3 8-3v-6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
  </symbol>

  <symbol id="i-refresh" viewBox="0 0 24 24">
    <path d="M4.5 12a7.5 7.5 0 0113-5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M19.5 12a7.5 7.5 0 01-13 5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M17.5 3.5v4h-4M6.5 20.5v-4h4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <symbol id="i-json" viewBox="0 0 24 24">
    <rect x="5" y="3" width="14" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="1.8"/>
    <path d="M8 8h8M8 12h6M8 16h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
  </symbol>

  <symbol id="i-terminal" viewBox="0 0 24 24">
    <rect x="3" y="4" width="18" height="16" rx="2" fill="none" stroke="currentColor" stroke-width="1.8"/>
    <path d="M7 9l4 3-4 3" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M13 15h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
  </symbol>

  <symbol id="i-layers" viewBox="0 0 24 24">
    <path d="M12 3l9 5-9 5-9-5 9-5z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
    <path d="M3 13l9 5 9-5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <symbol id="i-pbi-bars" viewBox="0 0 24 24">
    <rect x="4" y="11" width="4" height="8" rx="1" fill="#0F6E56"/>
    <rect x="10" y="6" width="4" height="13" rx="1" fill="#D85A30"/>
    <rect x="16" y="14" width="4" height="5" rx="1" fill="#BA7517"/>
  </symbol>
</defs>

<rect x="0" y="0" width="1760" height="690" fill="#FFFFFF"/>

<!-- Docker Compose boundary -->
<rect x="260" y="20" width="920" height="600" rx="16" fill="none" stroke="#378ADD" stroke-width="1" stroke-dasharray="6 4"/>
<use href="#i-container" x="280" y="34" width="20" height="20" style="color:#185FA5"/>
<text x="306" y="48" font-size="14" font-weight="600" fill="#2C2C2A">Docker Compose</text>
<text x="306" y="64" font-size="12" fill="#5F5E5A">Webserver · Scheduler · Worker · Triggerer · Postgres · Redis</text>

<!-- Scheduler -->
<g>
  <rect x="395" y="80" width="220" height="60" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.75"/>
  <use href="#i-airflow" x="411" y="90" width="20" height="20" style="color:#185FA5"/>
  <text x="441" y="104" font-size="14" font-weight="600" fill="#042C53">Airflow scheduler</text>
  <text x="441" y="122" font-size="12" fill="#185FA5">Monthly cron trigger</text>
</g>
<line x1="505" y1="140" x2="505" y2="168" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- BTS TranStats source -->
<g>
  <rect x="20" y="227" width="210" height="70" rx="10" fill="#FBEAF0" stroke="#993556" stroke-width="0.75"/>
  <use href="#i-cloud-down" x="36" y="247" width="20" height="20" style="color:#D4537E"/>
  <text x="66" y="253" font-size="14" font-weight="600" fill="#4B1528">BTS TranStats</text>
  <text x="66" y="271" font-size="12" fill="#993556">Monthly ZIP (CSV)</text>
</g>
<line x1="230" y1="262" x2="308" y2="262" stroke="#993556" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Ingestion DAG container -->
<rect x="290" y="170" width="430" height="350" rx="14" fill="none" stroke="#0F6E56" stroke-width="0.75" stroke-dasharray="5 4"/>
<use href="#i-airflow" x="310" y="182" width="16" height="16" style="color:#0F6E56"/>
<text x="332" y="195" font-size="14" font-weight="600" fill="#2C2C2A">bts_ingestion_pipeline</text>
<text x="310" y="211" font-size="12" fill="#5F5E5A">DAG · catchup=False</text>

<!-- Task 1 -->
<g>
  <rect x="310" y="234" width="380" height="56" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.75"/>
  <use href="#i-search" x="326" y="252" width="20" height="20" style="color:#1D9E75"/>
  <text x="362" y="268" font-size="14" font-weight="600" fill="#04342C">get_missing_months</text>
</g>
<line x1="500" y1="290" x2="500" y2="302" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Task 2 -->
<g>
  <rect x="310" y="304" width="380" height="56" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.75"/>
  <use href="#i-cloud-up" x="326" y="322" width="20" height="20" style="color:#1D9E75"/>
  <text x="362" y="338" font-size="14" font-weight="600" fill="#04342C">download_upload_to_b2</text>
</g>
<line x1="500" y1="360" x2="500" y2="372" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Task 3 -->
<g>
  <rect x="310" y="374" width="380" height="56" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.75"/>
  <use href="#i-database" x="326" y="392" width="20" height="20" style="color:#1D9E75"/>
  <text x="362" y="408" font-size="14" font-weight="600" fill="#04342C">load_to_snowflake</text>
</g>
<line x1="500" y1="430" x2="500" y2="442" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Task 4 -->
<g>
  <rect x="310" y="444" width="380" height="56" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.75"/>
  <use href="#i-refresh" x="326" y="462" width="20" height="20" style="color:#1D9E75"/>
  <text x="362" y="478" font-size="14" font-weight="600" fill="#04342C">trigger_dbt_build</text>
</g>

<line x1="690" y1="472" x2="758" y2="472" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>
<text x="724" y="460" text-anchor="middle" font-size="12" fill="#5F5E5A">TriggerDagRunOperator</text>

<!-- dbt build DAG container -->
<rect x="760" y="362" width="380" height="200" rx="14" fill="none" stroke="#993C1D" stroke-width="0.75" stroke-dasharray="5 4"/>
<use href="#i-airflow" x="780" y="374" width="16" height="16" style="color:#993C1D"/>
<text x="802" y="387" font-size="14" font-weight="600" fill="#2C2C2A">bts_dbt_build_pipeline</text>
<text x="780" y="403" font-size="12" fill="#5F5E5A">Triggered · schedule=None</text>

<g>
  <rect x="800" y="440" width="300" height="64" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="0.75"/>
  <use href="#i-terminal" x="816" y="458" width="20" height="20" style="color:#D85A30"/>
  <text x="852" y="466" font-size="14" font-weight="600" fill="#4A1B0C">dbt_build</text>
  <text x="852" y="484" font-size="12" fill="#993C1D">Full warehouse rebuild</text>
</g>

<!-- Seed data source, next to dbt -->
<line x1="950" y1="580" x2="950" y2="506" stroke="#993556" stroke-width="1.2" marker-end="url(#arrow)"/>
<g>
  <rect x="800" y="580" width="300" height="70" rx="10" fill="#FBEAF0" stroke="#993556" stroke-width="0.75"/>
  <use href="#i-json" x="816" y="598" width="20" height="20" style="color:#D4537E"/>
  <text x="852" y="606" font-size="14" font-weight="600" fill="#4B1528">Seed data</text>
  <text x="852" y="624" font-size="12" fill="#993556">OurAirports · Skytrax JSON</text>
</g>

<line x1="1100" y1="472" x2="1218" y2="472" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- FLIGHT_CORE warehouse -->
<g>
  <rect x="1220" y="437" width="260" height="70" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.75"/>
  <use href="#i-layers" x="1236" y="457" width="20" height="20" style="color:#7F77DD"/>
  <text x="1266" y="463" font-size="14" font-weight="600" fill="#26215C">FLIGHT_CORE warehouse</text>
  <text x="1266" y="481" font-size="12" fill="#534AB7">Facts + conformed dims</text>
</g>

<line x1="1480" y1="472" x2="1518" y2="472" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Power BI -->
<g>
  <rect x="1520" y="440" width="220" height="64" rx="10" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.75"/>
  <use href="#i-pbi-bars" x="1536" y="452" width="20" height="20"/>
  <text x="1566" y="458" font-size="14" font-weight="600" fill="#412402">Power BI</text>
  <text x="1566" y="476" font-size="12" fill="#854F0B">Dashboards &amp; reports</text>
</g>

</svg>
